services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: mvp2week-backend:dev
    ports:
      - "8000:8000"
    environment:
      MVP2WEEK_HOST: 0.0.0.0
      MVP2WEEK_PORT: "8000"
      MVP2WEEK_ALLOWED_ORIGINS: '["http://localhost:3000"]'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: mvp2week-frontend:dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5